<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doze-test — local chat</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1117;
        --panel: #1a1d27;
        --border: #2a2f3d;
        --text: #e8eaef;
        --muted: #8b93a7;
        --accent: #6ee7b7;
        --user: #2563eb;
        --bot: #374151;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1.5rem;
      }

      header {
        width: min(720px, 100%);
        margin-bottom: 1rem;
      }

      header h1 {
        margin: 0 0 0.25rem;
        font-size: 1.25rem;
        font-weight: 600;
      }

      header p {
        margin: 0;
        color: var(--muted);
        font-size: 0.875rem;
      }

      #chat {
        width: min(720px, 100%);
        flex: 1;
        display: flex;
        flex-direction: column;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        min-height: 420px;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .bubble {
        max-width: 85%;
        padding: 0.625rem 0.875rem;
        border-radius: 12px;
        line-height: 1.45;
        font-size: 0.9375rem;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .bubble.user {
        align-self: flex-end;
        background: var(--user);
      }

      .bubble.bot {
        align-self: flex-start;
        background: var(--bot);
      }

      .bubble.error {
        align-self: flex-start;
        background: #7f1d1d;
      }

      form {
        display: flex;
        gap: 0.5rem;
        padding: 0.75rem;
        border-top: 1px solid var(--border);
      }

      input[type="text"] {
        flex: 1;
        padding: 0.625rem 0.875rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 0.9375rem;
      }

      input[type="text"]:focus {
        outline: 2px solid var(--accent);
        outline-offset: 0;
      }

      button {
        padding: 0.625rem 1rem;
        border-radius: 8px;
        border: none;
        background: var(--accent);
        color: #0f1117;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.9375rem;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Doze-test</h1>
      <p>Local debug UI — posts to <code>POST /api/chat</code></p>
    </header>

    <div id="chat">
      <div id="messages"></div>
      <form id="form">
        <input
          id="input"
          type="text"
          placeholder="Say something…"
          autocomplete="off"
          required
        />
        <button type="submit" id="send">Send</button>
      </form>
    </div>

    <script>
      const messagesEl = document.getElementById("messages");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");

      const chatGuid = "http:local-debug";
      const sender = "local-user";

      function addBubble(text, role) {
        const el = document.createElement("div");
        el.className = `bubble ${role}`;
        el.textContent = text;
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = input.value.trim();
        if (!message) return;

        addBubble(message, "user");
        input.value = "";
        input.disabled = true;
        sendBtn.disabled = true;

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chatGuid, sender, message, isGroupChat: false }),
          });

          const data = await res.json();
          const text =
            data.response ||
            (Array.isArray(data.messages) ? data.messages.join("\n\n") : null) ||
            "No response.";

          addBubble(text, res.ok ? "bot" : "error");
        } catch (err) {
          addBubble("Network error — is the server running?", "error");
        } finally {
          input.disabled = false;
          sendBtn.disabled = false;
          input.focus();
        }
      });

      addBubble("Hi! I'm Doze-test. Send a message to try the stub agent.", "bot");
      input.focus();
    </script>
  </body>
</html>
